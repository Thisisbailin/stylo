<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stylo is an open-source desktop creative system built on Canvas, Flow and a project-native Agent."
    />
    <meta name="theme-color" content="#f3f3ef" />
    <meta property="og:title" content="Stylo" />
    <meta property="og:description" content="A desktop creative system built on Canvas, Flow and a project-native Agent." />
    <meta property="og:image" content="/icon-512.png" />
    <title>Stylo · Creative system for the desktop</title>
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="apple-touch-icon" sizes="256x256" href="/icon-256.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icon-256.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <script>
      (() => {
        const desktopBridge = window.styloDesktop || window.qalamDesktop;
        const hasDesktopBridge = Boolean(desktopBridge && desktopBridge.isDesktop);
        const hasElectronUserAgent = /\bElectron\/\d+/i.test(navigator.userAgent);
        const isDesktop = hasDesktopBridge || hasElectronUserAgent;
        document.documentElement.classList.add(isDesktop ? "stylo-desktop-runtime" : "stylo-web-runtime");
      })();
    </script>
    <style>
      :root {
        --bg-base: #0f0f0f;
        --bg-panel: #0f0f0f;
        --bg-panel-rgb: 15, 15, 15;
        --bg-elevated: #121212;
        --bg-elevated-rgb: 18, 18, 18;
        --bg-overlay: #151515;
        --bg-muted: #1b1b1b;
        --border-subtle: #1f2937;
        --border-strong: #263244;
        --text-primary: #f8fafc;
        --text-secondary: #9ca3af;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
        --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
        --dot-weak: rgba(255, 255, 255, 0.04);
        --dot-strong: rgba(255, 255, 255, 0.06);
      }

      :root.theme-dark,
      body.theme-dark {
        --bg-base: #0f0f0f;
        --bg-panel: #0f0f0f;
        --bg-panel-rgb: 15, 15, 15;
        --bg-elevated: #121212;
        --bg-elevated-rgb: 18, 18, 18;
        --bg-overlay: #151515;
        --bg-muted: #1b1b1b;
        --border-subtle: #1f2937;
        --border-strong: #263244;
        --text-primary: #f8fafc;
        --text-secondary: #9ca3af;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
        --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
        --dot-weak: rgba(255, 255, 255, 0.04);
        --dot-strong: rgba(255, 255, 255, 0.06);
      }

      :root.theme-light,
      body.theme-light {
        --bg-base: #ffffff;
        --bg-panel: #ffffff;
        --bg-panel-rgb: 255, 255, 255;
        --bg-elevated: #ffffff;
        --bg-elevated-rgb: 255, 255, 255;
        --bg-overlay: #f8fafc;
        --bg-muted: #eef2f6;
        --border-subtle: #e5e7eb;
        --border-strong: #cbd5e1;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.12);
        --shadow-strong: 0 16px 36px rgba(15, 23, 42, 0.16);
        --dot-weak: rgba(15, 23, 42, 0.04);
        --dot-strong: rgba(15, 23, 42, 0.08);
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg-panel);
        color: var(--text-primary);
      }

      .stylo-web-runtime body {
        overflow-x: hidden;
        background: #f3f3ef;
        color: #181817;
      }

      .stylo-desktop-runtime,
      .stylo-desktop-runtime body {
        background: #f6f6f4;
        color: #181817;
      }

      #stylo-desktop-boot {
        display: none;
      }

      .stylo-desktop-runtime #stylo-desktop-boot {
        position: fixed;
        inset: 0;
        z-index: 2147482000;
        display: grid;
        place-items: center;
        overflow: hidden;
        background-color: #f6f6f4;
        background-image: radial-gradient(rgba(24, 24, 23, 0.07) 0.7px, transparent 0.7px);
        background-size: 22px 22px;
        opacity: 1;
        pointer-events: none;
        transition: opacity 220ms cubic-bezier(0.16, 1, 0.3, 1);
        -webkit-app-region: drag;
      }

      .stylo-desktop-runtime #stylo-desktop-boot::after {
        position: absolute;
        inset: 0;
        background: rgba(246, 246, 244, 0.7);
        content: "";
      }

      .stylo-desktop-runtime #stylo-desktop-boot.stylo-desktop-boot--exit {
        opacity: 0;
      }

      .stylo-desktop-boot__mark {
        position: relative;
        z-index: 1;
        display: grid;
        width: 112px;
        justify-items: start;
        gap: 14px;
        transform: translate3d(0, -2vh, 0);
      }

      .stylo-desktop-boot__word {
        color: #1b1b1a;
        font-family: -apple-system, BlinkMacSystemFont, "Avenir Next", "Segoe UI", sans-serif;
        font-size: 27px;
        font-weight: 650;
        line-height: 1;
        letter-spacing: 0;
      }

      .stylo-desktop-boot__icon {
        width: 54px;
        height: 54px;
        border-radius: 14px;
        object-fit: cover;
      }

      .stylo-desktop-boot__track {
        position: relative;
        width: 72px;
        height: 1px;
        overflow: hidden;
        background: rgba(27, 27, 26, 0.14);
      }

      .stylo-desktop-boot__track::after {
        position: absolute;
        inset: 0 auto 0 0;
        width: 28px;
        background: #a94941;
        content: "";
        animation: stylo-desktop-boot-stroke 1.35s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        will-change: transform;
      }

      @keyframes stylo-desktop-boot-stroke {
        0% { transform: translate3d(-32px, 0, 0); }
        50% { transform: translate3d(76px, 0, 0); }
        100% { transform: translate3d(76px, 0, 0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .stylo-desktop-boot__track::after {
          animation: none;
          transform: translate3d(22px, 0, 0);
        }
      }

      .bg-dot-grid {
        background-color: var(--bg-panel);
        background-image:
          radial-gradient(circle at 1px 1px, var(--dot-strong) 1px, transparent 0),
          radial-gradient(circle at 1px 1px, var(--dot-weak) 1px, transparent 0);
        background-position: 0 0, 14px 14px;
        background-size: 28px 28px;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        border-radius: 4px;
        background: #9ca3af;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <div id="stylo-desktop-boot" role="status" aria-label="Stylo is opening">
      <div class="stylo-desktop-boot__mark" aria-hidden="true">
        <img class="stylo-desktop-boot__icon" src="/icon-128.png" alt="" />
        <span class="stylo-desktop-boot__word">Stylo</span>
        <span class="stylo-desktop-boot__track"></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
