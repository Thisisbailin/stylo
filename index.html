<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qalam · Flow Workspace</title>
  <link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png" />
  <link rel="icon" type="image/png" sizes="256x256" href="/icon-256.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      --bg-base: #0f0f0f;
      --bg-panel: #0f0f0f;
      --bg-panel-rgb: 15, 15, 15;
      --bg-elevated: #121212;
      --bg-elevated-rgb: 18, 18, 18;
      --bg-overlay: #151515;
      --bg-muted: #1b1b1b;
      --border-subtle: #1f2937;
      --border-strong: #263244;
      --text-primary: #f8fafc;
      --text-secondary: #9ca3af;
      --accent-green: #10b981;
      --accent-blue: #0ea5e9;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
      --dot-weak: rgba(255, 255, 255, 0.04);
      --dot-strong: rgba(255, 255, 255, 0.06);
    }

    :root.theme-dark,
    body.theme-dark {
      --bg-base: #0f0f0f;
      --bg-panel: #0f0f0f;
      --bg-panel-rgb: 15, 15, 15;
      --bg-elevated: #121212;
      --bg-elevated-rgb: 18, 18, 18;
      --bg-overlay: #151515;
      --bg-muted: #1b1b1b;
      --border-subtle: #1f2937;
      --border-strong: #263244;
      --text-primary: #f8fafc;
      --text-secondary: #9ca3af;
      --accent-green: #10b981;
      --accent-blue: #0ea5e9;
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
      --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
      --dot-weak: rgba(255, 255, 255, 0.04);
      --dot-strong: rgba(255, 255, 255, 0.06);
    }

    :root.theme-light,
    body.theme-light {
      --bg-base: #ffffff;
      --bg-panel: #ffffff;
      --bg-panel-rgb: 255, 255, 255;
      --bg-elevated: #ffffff;
      --bg-elevated-rgb: 255, 255, 255;
      --bg-overlay: #f8fafc;
      --bg-muted: #eef2f6;
      --border-subtle: #e5e7eb;
      --border-strong: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent-green: #10b981;
      --accent-blue: #0ea5e9;
      --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.12);
      --shadow-strong: 0 16px 36px rgba(15, 23, 42, 0.16);
      --dot-weak: rgba(15, 23, 42, 0.04);
      --dot-strong: rgba(15, 23, 42, 0.08);
    }

    body {
      background: var(--bg-panel);
      color: var(--text-primary);
    }

    body.qalam-invite-gated #root {
      opacity: 0;
      pointer-events: none;
      user-select: none;
    }

    .qalam-entry {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 32%, rgba(16, 185, 129, 0.12), transparent 30%),
        #0f0f0f;
      color: #f8fafc;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .qalam-entry__panel {
      width: min(360px, calc(100vw - 48px));
      display: grid;
      gap: 22px;
      justify-items: center;
      text-align: center;
    }

    .qalam-entry__loader {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(248, 250, 252, 0.18);
      border-top-color: #10b981;
      border-radius: 999px;
      animation: qalam-entry-spin 0.9s linear infinite;
    }

    .qalam-entry__title {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
      line-height: 1;
      letter-spacing: 0;
    }

    .qalam-entry__form {
      width: 100%;
      display: grid;
      gap: 10px;
    }

    .qalam-entry__input {
      height: 44px;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(248, 250, 252, 0.14);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: #f8fafc;
      outline: none;
      padding: 0 14px;
      text-align: center;
      font-size: 15px;
      letter-spacing: 0;
    }

    .qalam-entry__input:focus {
      border-color: rgba(16, 185, 129, 0.7);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.14);
    }

    .qalam-entry__button {
      height: 40px;
      border: 0;
      border-radius: 8px;
      background: #f8fafc;
      color: #0f172a;
      cursor: pointer;
      font-size: 14px;
      font-weight: 650;
    }

    .qalam-entry__message {
      min-height: 18px;
      margin: 0;
      color: #94a3b8;
      font-size: 12px;
      line-height: 18px;
    }

    .qalam-entry[data-state="error"] .qalam-entry__message {
      color: #f87171;
    }

    .qalam-entry[data-state="loading"] .qalam-entry__form {
      opacity: 0.48;
      pointer-events: none;
    }

    .qalam-entry.qalam-entry--exit {
      opacity: 0;
      transition: opacity 180ms ease;
    }

    @keyframes qalam-entry-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .bg-dot-grid {
      background-color: var(--bg-panel);
      background-image:
        radial-gradient(circle at 1px 1px, var(--dot-strong) 1px, transparent 0),
        radial-gradient(circle at 1px 1px, var(--dot-weak) 1px, transparent 0);
      background-size: 28px 28px;
      background-position: 0 0, 14px 14px;
    }

    /* Custom scrollbar for better aesthetics in split views */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #9ca3af;
      border-radius: 4px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #4b5563;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "recharts": "https://esm.sh/recharts@2.13.0?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react,react-dom",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "url": "https://aistudiocdn.com/url@^0.11.4",
    "@clerk/clerk-react": "https://esm.sh/@clerk/clerk-react@5.26.0?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>
</head>

<body class="font-sans antialiased overflow-hidden qalam-invite-gated">
  <div id="qalam-entry" class="qalam-entry" data-state="idle" role="dialog" aria-modal="true" aria-labelledby="qalam-entry-title">
    <div class="qalam-entry__panel">
      <div class="qalam-entry__loader" aria-hidden="true"></div>
      <h1 id="qalam-entry-title" class="qalam-entry__title">Qalam</h1>
      <form id="qalam-entry-form" class="qalam-entry__form" autocomplete="off">
        <input
          id="qalam-entry-input"
          class="qalam-entry__input"
          name="qalam-entry-token"
          type="password"
          inputmode="text"
          autocomplete="new-password"
          autocapitalize="off"
          spellcheck="false"
          placeholder="邀请码"
          aria-label="邀请码"
        />
        <button class="qalam-entry__button" type="submit">Enter</button>
        <p id="qalam-entry-message" class="qalam-entry__message">Enter invite code to continue.</p>
      </form>
    </div>
  </div>
  <div id="root"></div>
  <script>
    (() => {
      const inviteCode = "#0000";
      const entry = document.getElementById("qalam-entry");
      const form = document.getElementById("qalam-entry-form");
      const input = document.getElementById("qalam-entry-input");
      const message = document.getElementById("qalam-entry-message");
      const root = document.getElementById("root");

      const revealApp = () => {
        document.body.classList.remove("qalam-invite-gated");
        entry.classList.add("qalam-entry--exit");
        window.setTimeout(() => entry.remove(), 180);
      };

      const waitForApp = () => {
        const startedAt = Date.now();
        const tick = () => {
          if (root && root.childElementCount > 0) {
            revealApp();
            return;
          }
          if (Date.now() - startedAt > 120000) {
            message.textContent = "Still loading...";
          }
          window.requestAnimationFrame(tick);
        };
        tick();
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (input.value.trim() !== inviteCode) {
          entry.dataset.state = "error";
          message.textContent = "Invalid invite code.";
          input.value = "";
          input.focus();
          return;
        }
        entry.dataset.state = "loading";
        input.value = "";
        input.blur();
        message.textContent = "Loading workspace...";
        waitForApp();
      });

      window.addEventListener("pageshow", () => {
        input.value = "";
        input.focus({ preventScroll: true });
      });
    })();
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
