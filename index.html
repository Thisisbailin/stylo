<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Stylo is an open-source desktop creative system built on Canvas, Flow and a project-native Agent."
    />
    <meta name="theme-color" content="#f3f3ef" />
    <title>Stylo · Creative system for the desktop</title>
    <link rel="icon" type="image/png" sizes="128x128" href="/icon-128.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/icon-256.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <style>
      :root {
        --bg-base: #0f0f0f;
        --bg-panel: #0f0f0f;
        --bg-panel-rgb: 15, 15, 15;
        --bg-elevated: #121212;
        --bg-elevated-rgb: 18, 18, 18;
        --bg-overlay: #151515;
        --bg-muted: #1b1b1b;
        --border-subtle: #1f2937;
        --border-strong: #263244;
        --text-primary: #f8fafc;
        --text-secondary: #9ca3af;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
        --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
        --dot-weak: rgba(255, 255, 255, 0.04);
        --dot-strong: rgba(255, 255, 255, 0.06);
      }

      :root.theme-dark,
      body.theme-dark {
        --bg-base: #0f0f0f;
        --bg-panel: #0f0f0f;
        --bg-panel-rgb: 15, 15, 15;
        --bg-elevated: #121212;
        --bg-elevated-rgb: 18, 18, 18;
        --bg-overlay: #151515;
        --bg-muted: #1b1b1b;
        --border-subtle: #1f2937;
        --border-strong: #263244;
        --text-primary: #f8fafc;
        --text-secondary: #9ca3af;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.28);
        --shadow-strong: 0 16px 36px rgba(0, 0, 0, 0.32);
        --dot-weak: rgba(255, 255, 255, 0.04);
        --dot-strong: rgba(255, 255, 255, 0.06);
      }

      :root.theme-light,
      body.theme-light {
        --bg-base: #ffffff;
        --bg-panel: #ffffff;
        --bg-panel-rgb: 255, 255, 255;
        --bg-elevated: #ffffff;
        --bg-elevated-rgb: 255, 255, 255;
        --bg-overlay: #f8fafc;
        --bg-muted: #eef2f6;
        --border-subtle: #e5e7eb;
        --border-strong: #cbd5e1;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --accent-green: #10b981;
        --accent-blue: #0ea5e9;
        --shadow-soft: 0 12px 28px rgba(15, 23, 42, 0.12);
        --shadow-strong: 0 16px 36px rgba(15, 23, 42, 0.16);
        --dot-weak: rgba(15, 23, 42, 0.04);
        --dot-strong: rgba(15, 23, 42, 0.08);
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg-panel);
        color: var(--text-primary);
      }

      .stylo-web-runtime body {
        overflow-x: hidden;
        background: #f3f3ef;
        color: #181817;
      }

      .bg-dot-grid {
        background-color: var(--bg-panel);
        background-image:
          radial-gradient(circle at 1px 1px, var(--dot-strong) 1px, transparent 0),
          radial-gradient(circle at 1px 1px, var(--dot-weak) 1px, transparent 0);
        background-position: 0 0, 14px 14px;
        background-size: 28px 28px;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        border-radius: 4px;
        background: #9ca3af;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
      }
    </style>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
